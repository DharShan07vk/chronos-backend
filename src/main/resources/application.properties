spring.application.name=chronos
spring.web.resources.static-locations=classpath:/static/,file:./


spring.datasource.url=${DB_URI}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform= org.hibernate.dialect.PostgreSQLDialect

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRE}

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:1357,https://time-capsule-snowy.vercel.app}
app.media.cache-max-age-seconds=${APP_MEDIA_CACHE_MAX_AGE_SECONDS:31536000}
